name: mememaster_tw
description: 全自動台灣迷因採集 App

publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Supabase ──────────────────────────────────────────────
  supabase_flutter: ^2.3.4

  # ── UI / Grid ─────────────────────────────────────────────
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1

  # ── Video ─────────────────────────────────────────────────
  video_player: ^2.8.6
  cached_video_player_plus: ^3.0.2
  chewie: ^1.8.1

  # ── Firebase (FCM) ────────────────────────────────────────
  firebase_core: ^2.27.1
  firebase_messaging: ^14.9.1

  # ── Share / Download ─────────────────────────────────────
  share_plus: ^9.0.0
  image_gallery_saver: ^2.0.3
  path_provider: ^2.1.2

  # ── Navigation ────────────────────────────────────────────
  go_router: ^13.2.0

  # ── Image zoom ────────────────────────────────────────────
  photo_view: ^0.14.0

  # ── Utils ─────────────────────────────────────────────────
  flutter_cache_manager: ^3.3.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
