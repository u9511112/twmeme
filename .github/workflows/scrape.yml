name: Scrape Memes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to scrape (space-separated). ptt, dcard, threads, instagram.'
        required: false
        default: 'ptt dcard threads instagram'

jobs:
  scrape:
    name: Scrape Memes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Chromium for patchright/playwright
        working-directory: scraper
        run: |
          python -m patchright install chromium || \
          python -m playwright install chromium

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run scraper
        working-directory: scraper
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || 'ptt dcard threads instagram' }}"
          doppler run -- python main.py --platforms $PLATFORMS

      - name: Trigger Vercel redeploy to regenerate /meme/*.html SSG pages
        # Runs after a successful scrape so new memes get static long-tail
        # pages within ~30s of being written to the DB. If the secret is
        # missing the step logs the setup instructions and exits 0 — never
        # fails the scrape run for a Phase 2 deploy-pipeline concern.
        if: success()
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK secret not set — skipping SSG redeploy."
            echo ""
            echo "To enable per-scrape redeploys:"
            echo "  1. Vercel dashboard → twmeme project → Settings → Git → Deploy Hooks"
            echo "  2. Create hook on the master branch (any name, e.g. 'scraper-trigger')"
            echo "  3. Copy the URL into this repo's Settings → Secrets → Actions"
            echo "     as VERCEL_DEPLOY_HOOK"
            echo ""
            echo "Without this, new memes only get static pages on next manual deploy."
            exit 0
          fi
          echo "Triggering Vercel rebuild..."
          curl -sS -X POST "$HOOK_URL" -w "\nHTTP %{http_code}\n"

      - name: Upload scraper logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: scraper/*.log
          if-no-files-found: ignore
