name: Scrape Memes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to scrape (space-separated). Dcard needs residential proxy (see DCARD-CI-STATUS.md). Threads/IG also need residential proxy.'
        required: false
        default: 'ptt'

jobs:
  scrape:
    name: Scrape Memes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Chromium for patchright/playwright
        working-directory: scraper
        run: |
          python -m patchright install chromium || \
          python -m playwright install chromium

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Run scraper
        working-directory: scraper
        env:
          NEON_DATABASE_URL:     ${{ secrets.NEON_DATABASE_URL }}
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:         ${{ secrets.R2_PUBLIC_URL }}
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || 'ptt' }}"
          python main.py --platforms $PLATFORMS

      - name: Upload scraper logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: scraper/*.log
          if-no-files-found: ignore
