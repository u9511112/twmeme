name: Scrape Memes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to scrape (space-separated). ptt, dcard, baha, threads, instagram.'
        required: false
        default: 'ptt dcard baha'

jobs:
  scrape:
    name: Scrape Memes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Chromium for patchright/playwright
        working-directory: scraper
        run: |
          python -m patchright install chromium || \
          python -m playwright install chromium

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run scraper
        working-directory: scraper
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || 'ptt dcard baha' }}"
          doppler run -- python main.py --platforms $PLATFORMS

      - name: Backfill AI metadata
        working-directory: scraper
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -- python scripts/backfill_gemini_metadata.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate static pages (SSG)
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -- node scripts/generate_static_pages.mjs

      - name: Deploy to Cloudflare Pages
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run -- npx wrangler pages deploy web --project-name=twmeme --branch=master

      - name: Upload scraper logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: scraper/*.log
          if-no-files-found: ignore
