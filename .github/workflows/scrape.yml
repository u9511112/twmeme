name: Scrape Memes

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to scrape (space-separated). Threads/IG need residential proxies.'
        required: false
        default: 'ptt dcard'

jobs:
  scrape:
    name: Scrape Memes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        working-directory: scraper
        run: pip install -r requirements.txt

      - name: Install Chromium for patchright/playwright
        working-directory: scraper
        run: |
          python -m patchright install chromium || \
          python -m playwright install chromium

      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      # GH Actions runners' default DNS resolver gets NXDOMAIN for www.dcard.tw
      # (Dcard geo-blocks GH IP ranges at the authoritative DNS layer). Override
      # resolv.conf to Cloudflare, then route Chromium through a localhost
      # tinyproxy. Why the proxy:
      #   - Chromium's built-in AsyncDns resolver (and patchright's stealth fork)
      #     ignores both /etc/resolv.conf overrides AND --host-resolver-rules.
      #     /etc/hosts pins were also silently ignored. Tried, didn't work.
      #   - tinyproxy uses libc getaddrinfo for DNS, which honors our resolv.conf.
      #     Chromium connects only to 127.0.0.1:8888 (no DNS needed); tinyproxy
      #     resolves the real hostname and CONNECT-tunnels TLS through. CF still
      #     sees real Chromium TLS fingerprint, so WAF challenges pass normally.
      - name: Set Cloudflare resolver + start tinyproxy for Chromium
        run: |
          sudo systemctl disable --now systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          sudo sh -c 'printf "nameserver 1.1.1.1\nnameserver 1.0.0.1\nnameserver 8.8.8.8\n" > /etc/resolv.conf'
          echo "--- /etc/resolv.conf ---"
          cat /etc/resolv.conf
          echo "--- libc DNS sanity check ---"
          getent hosts www.dcard.tw || echo "(libc has no IPv4 — tinyproxy will use IPv6)"
          getent hosts www.ptt.cc

          sudo apt-get install -y -qq tinyproxy
          sudo sed -i 's/^LogLevel.*/LogLevel Critical/' /etc/tinyproxy/tinyproxy.conf
          sudo systemctl restart tinyproxy
          sleep 1
          sudo systemctl is-active --quiet tinyproxy || (echo "::error::tinyproxy failed to start"; sudo journalctl -u tinyproxy --no-pager -n 30; exit 1)

          echo "--- tinyproxy probe to www.dcard.tw ---"
          PROBE=$(curl -sS -x http://127.0.0.1:8888 -o /dev/null -w "%{http_code}" --max-time 20 https://www.dcard.tw/ || echo "ERR")
          echo "tinyproxy → www.dcard.tw responded with: $PROBE"
          if [ "$PROBE" = "ERR" ] || [ "$PROBE" = "000" ]; then
            echo "::error::tinyproxy could not reach www.dcard.tw"
            exit 1
          fi

          echo "http://127.0.0.1:8888" > scraper/proxies.txt
          echo "--- scraper/proxies.txt ---"
          cat scraper/proxies.txt

      - name: Run scraper
        working-directory: scraper
        env:
          NEON_DATABASE_URL:     ${{ secrets.NEON_DATABASE_URL }}
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID:      ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:  ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET:             ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL:         ${{ secrets.R2_PUBLIC_URL }}
        run: |
          PLATFORMS="${{ github.event.inputs.platforms || 'ptt dcard' }}"
          python main.py --platforms $PLATFORMS

      - name: Upload scraper logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: scraper/*.log
          if-no-files-found: ignore
