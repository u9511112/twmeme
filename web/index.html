<!-- supabase-js v2 (anon key in supabase.js is public-safe by RLS) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="render.js"></script>

<script>
  // Mock fallback (same shape as Supabase rows). Used when DB is paused.
  const MOCK_TRENDING = [
    { title:'我的刀盾',         emoji:'🛡️⚔️',  bg:'t-coral',  quality:'HD' },
    { title:'貓咪驚恐',         emoji:'😱',     bg:'t-sky',    quality:'4K' },
    { title:'黑人問號',         emoji:'🤔❓',   bg:'t-mustard',quality:'HD' },
    { title:'週一憂鬱柴柴',     emoji:'🐕😮‍💨',  bg:'t-sage',   quality:'HD' },
    { title:'誠實豆沙包',       emoji:'🫘🥟',   bg:'t-rose',   quality:'原圖' },
    { title:'奧客貓',           emoji:'🐈‍⬛😠',  bg:'t-plum',   quality:'HD' },
    { title:'哭著也要畫完',     emoji:'😭🎨',   bg:'t-mint',   quality:'4K' },
    { title:'小丑竟是我自己',   emoji:'🤡🎪',   bg:'t-sand',   quality:'HD' },
    { title:'上班中請勿打擾',   emoji:'🥱💤',   bg:'t-steel',  quality:'HD' },
  ];

  function pick(word) {
    document.getElementById('q').value = word;
    goResults();
  }
  function goResults() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;
    location.href = 'results.html?q=' + encodeURIComponent(q);
  }

  async function loadTrending() {
    const grid = document.getElementById('trending-grid');
    let memes = await window.TWmeme.supa.getTrendingMemes(12);
    if (!memes || memes.length === 0) memes = MOCK_TRENDING;
    window.TWmeme.render.renderGrid(grid, memes);
  }

  loadTrending();
</script>
</body>
