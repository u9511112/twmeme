<main>
<section class="hero">
  <h1>找到那張你記得<br>但搜不到的迷因</h1>
  <p class="sub" id="hero-sub">早期版本、以 PTT 表特板為主。搜不到的告訴我們、會補上。</p>

  <form class="searchbox" onsubmit="event.preventDefault(); goResults();">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="輸入你記得的關鍵字、人名、或標題片段">
    <button class="btn-search" type="submit" aria-label="搜尋">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>

  </form>

  <div class="section-head">
    <h2>目前收錄</h2>
    <a class="more" href="results.html">看全部 →</a>

<div class="toast" id="toast"></div>

<!-- Neon HTTP driver loaded lazily via dynamic import inside db.js -->
<!-- (web_anon DB creds in db.js are GRANT-restricted, public-safe) -->
<script src="db.js"></script>
<script src="render.js"></script>

<script>
  function goResults() {
    const q = document.getElementById('q').value.trim();
    if (!q) return;
    location.href = 'results.html?q=' + encodeURIComponent(q);
  }

  async function loadTrending() {
    const grid = document.getElementById('trending-grid');
    const memes = await window.TWmeme.supa.getTrendingMemes(12);
    if (memes && memes.length > 0) {
      window.TWmeme.render.renderGrid(grid, memes);
    }
    // DB unreachable / empty: leave grid blank, no fake content.
  }

  async function loadHeroCount() {
    const sub = document.getElementById('hero-sub');
    const n = await window.TWmeme.supa.getMemeCount();
    if (typeof n === 'number' && n > 0) {
      sub.textContent = `早期版本、目前 ${n.toLocaleString('en')} 張、以 PTT 表特板為主。搜不到的告訴我們、會補上。`;
    }
    // null (DB unreachable): keep generic copy, no number.
  }

  loadTrending();
  loadHeroCount();
</script>
</body>
