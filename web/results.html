<main>
<section class="section">
  <h1 class="sr-only">搜尋結果</h1>
  <div class="masonry" id="grid"></div>
</section>
</main>

<footer class="site-footer">

<div class="toast" id="toast"></div>

<script>
  // Allowlist of known gradient classes. If future Supabase data includes
  // a color-key, still only classes in this set are applied to className.
  const ALLOWED_BGS = new Set([
    't-coral','t-mustard','t-sage','t-sky','t-plum',
    't-sand','t-mint','t-rose','t-steel',
  ]);

  // Mock data (Phase 1 will replace with Supabase query). Untrusted fields
  // (name, bg, quality, emoji) are rendered via textContent / allowlist,
  // never concatenated into innerHTML, so later DB-driven content is safe.
  const memes = [
    { bg:'t-sky',    emoji:'😱',     name:'貓咪驚恐 ver.1', quality:'4K', tall:true  },
    { bg:'t-coral',  emoji:'🙀',     name:'嚇歪貓',         quality:'HD', tall:false },
    { bg:'t-mustard',emoji:'😾',     name:'暴怒橘貓',       quality:'HD', tall:false },
    { bg:'t-rose',   emoji:'🐱💦',   name:'冒冷汗貓',       quality:'HD', tall:true  },
    { bg:'t-sage',   emoji:'🐈‍⬛😰', name:'黑貓受驚',       quality:'HD', tall:false },
    { bg:'t-plum',   emoji:'😹',     name:'笑到流淚貓',     quality:'4K', tall:false },
    { bg:'t-mint',   emoji:'🐾👀',   name:'偷看貓',         quality:'HD', tall:true  },
    { bg:'t-sand',   emoji:'😼',     name:'得意貓',         quality:'HD', tall:false },
    { bg:'t-steel',  emoji:'🧊🐱',   name:'結冰貓',         quality:'HD', tall:false },
    { bg:'t-coral',  emoji:'🫣',     name:'遮臉貓',         quality:'HD', tall:true  },
    { bg:'t-sky',    emoji:'🙄',     name:'翻白眼貓',       quality:'HD', tall:false },
    { bg:'t-mustard',emoji:'🐱🔥',   name:'怒火貓',         quality:'4K', tall:false },
    { bg:'t-sage',   emoji:'😿',     name:'哭泣貓',         quality:'HD', tall:false },
    { bg:'t-plum',   emoji:'🤨',     name:'懷疑貓',         quality:'HD', tall:true  },
    { bg:'t-rose',   emoji:'😺',     name:'邪笑貓',         quality:'HD', tall:false },
    { bg:'t-mint',   emoji:'🥺',     name:'可憐貓',         quality:'HD', tall:false },
  ];

  const params = new URLSearchParams(location.search);
  const q = params.get('q');
  if (q) { document.getElementById('q').value = q; }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  }

  function renderCard(meme) {
    const wrap = document.createElement('article');
    wrap.className = 'card-wrap' + (meme.tall ? ' tall' : '');

    const link = document.createElement('a');
    link.className = 'card';
    link.href = 'detail.html';
    link.setAttribute('aria-label', meme.name + ' 迷因詳細');

    const thumb = document.createElement('div');
    const bgClass = ALLOWED_BGS.has(meme.bg) ? meme.bg : 't-sand';
    thumb.className = 'thumb ' + bgClass;
    thumb.textContent = meme.emoji;

    const badge = document.createElement('span');
    badge.className = 'quality-badge';
    badge.textContent = meme.quality;
    thumb.appendChild(badge);

    const caption = document.createElement('div');
    caption.className = 'caption';
    const nameSpan = document.createElement('span');
    nameSpan.className = 'name';
    nameSpan.textContent = meme.name;
    caption.appendChild(nameSpan);

    link.appendChild(thumb);
    link.appendChild(caption);

    const copyBtn = document.createElement('button');
    copyBtn.type = 'button';
    copyBtn.className = 'copy-ghost';
    copyBtn.textContent = '複製';
    copyBtn.dataset.meme = meme.name;
    copyBtn.addEventListener('click', () => {
      showToast('已複製「' + meme.name + '」');
    });

    wrap.appendChild(link);
    wrap.appendChild(copyBtn);
    return wrap;
  }

  const grid = document.getElementById('grid');
  const frag = document.createDocumentFragment();
  memes.forEach(m => frag.appendChild(renderCard(m)));
  grid.appendChild(frag);

  function doSearch() {
    const val = document.getElementById('q').value.trim();
    if (val) location.href = 'results.html?q=' + encodeURIComponent(val);
  }
</script>
</body>
</html>
