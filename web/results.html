<body>

<header class="site-header">
  <a href="index.html" class="wordmark">迷因<em>搜</em></a>
  <nav class="nav-links">
    <a href="mailto:u9511112@gmail.com?subject=TWmeme%20%E6%84%8F%E8%A6%8B%E5%9B%9E%E9%A5%8B">意見回饋</a>
  </nav>
</header>

<div class="topbar">
  <div class="topbar-main">
    <a href="index.html" class="back" aria-label="返回">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </a>
    <form class="searchbox" id="search-form">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" type="text" aria-label="搜尋迷因關鍵字" value="">
      <button class="btn-search" type="submit" aria-label="搜尋">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </button>
    </form>
  </div>
  
  <div class="filter-bar">
    <div class="filter-group">
      <select id="filter-platform" class="filter-select">
        <option value="all">所有平台</option>
        <option value="ptt">PTT</option>
        <option value="dcard">Dcard</option>
        <option value="baha">巴哈姆特</option>
      </select>
    </div>
    <div class="filter-group">
      <select id="filter-type" class="filter-select">
        <option value="all">所有格式</option>
        <option value="image">靜態圖片</option>
        <option value="gif">動態 GIF</option>
      </select>
    </div>
    <div class="filter-group">
      <select id="filter-sort" class="filter-select">
        <option value="relevance">相關度排序</option>
        <option value="latest">最新發佈</option>
        <option value="popular">熱門程度</option>
      </select>
    </div>
  </div>
  
  <div class="result-meta">找到 <strong id="count">—</strong> 張</div>
</div>

<main>
<section class="section">
  <h1 class="sr-only">搜尋結果</h1>

  <!-- Zero-result fallback form: shown when no memes match the query.
       Inline above the (empty) grid so users don't have to scroll. -->
  <div id="unmet-form" class="unmet-form" hidden>
    <h2 class="unmet-title">沒找到「<span id="unmet-query"></span>」？</h2>
    <p class="unmet-sub">描述一下你想找的迷因、我們收集起來補上。</p>
    <form id="unmet-form-el">
      <textarea id="unmet-text" rows="3" maxlength="280"
        placeholder="例：那張柴犬被雷打到的反應圖、或是 PTT 那個館長跪的梗"></textarea>
      <button type="submit" class="unmet-submit">送出</button>
    </form>
  </div>

  <div id="skeleton-grid" class="masonry skeleton-grid" hidden>
    <div class="skeleton-card"></div>
    <div class="skeleton-card tall"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card tall"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>

  <div class="masonry" id="grid"></div>
</section>
</main>

<footer class="site-footer">
  © 2026 TWmeme · 台灣繁中迷因社群工具
</footer>

<div class="toast" id="toast"></div>

<!-- Neon HTTP driver loaded lazily via dynamic import inside db.js -->
<!-- (web_anon DB creds in db.js are GRANT-restricted, public-safe) -->
<script src="db.js"></script>
<script src="render.js"></script>

<script>
  // Mock fallback if the DB is unreachable. Site never goes blank.
  // Same shape as DB rows (title + emoji thumb).
  const MOCK_RESULTS = [
    { title:'貓咪驚恐',     emoji:'😱',     bg:'t-sky',    quality:'4K', tall:true  },
    { title:'嚇歪貓',       emoji:'🙀',     bg:'t-coral',  quality:'HD' },
    { title:'暴怒橘貓',     emoji:'😾',     bg:'t-mustard',quality:'HD' },
    { title:'冒冷汗貓',     emoji:'🐱💦',   bg:'t-rose',   quality:'HD', tall:true  },
    { title:'黑貓受驚',     emoji:'🐈‍⬛😰', bg:'t-sage',   quality:'HD' },
    { title:'笑到流淚貓',   emoji:'😹',     bg:'t-plum',   quality:'4K' },
    { title:'偷看貓',       emoji:'🐾👀',   bg:'t-mint',   quality:'HD', tall:true  },
    { title:'得意貓',       emoji:'😼',     bg:'t-sand',   quality:'HD' },
    { title:'結冰貓',       emoji:'🧊🐱',   bg:'t-steel',  quality:'HD' },
    { title:'遮臉貓',       emoji:'🫣',     bg:'t-coral',  quality:'HD', tall:true  },
    { title:'翻白眼貓',     emoji:'🙄',     bg:'t-sky',    quality:'HD' },
    { title:'怒火貓',       emoji:'🐱🔥',   bg:'t-mustard',quality:'4K' },
  ];

  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const unmetForm = document.getElementById('unmet-form');
  const unmetQuerySpan = document.getElementById('unmet-query');
  const skeleton = document.getElementById('skeleton-grid');

  function initFiltersFromUrl() {
    const params = new URLSearchParams(location.search);
    document.getElementById('q').value = params.get('q') || '';
    document.getElementById('filter-platform').value = params.get('platform') || 'all';
    document.getElementById('filter-type').value = params.get('type') || 'all';
    document.getElementById('filter-sort').value = params.get('sort') || 'relevance';
  }

  async function loadResults() {
    const q = document.getElementById('q').value.trim();
    const platform = document.getElementById('filter-platform').value;
    const media_type = document.getElementById('filter-type').value;
    const sort_by = document.getElementById('filter-sort').value;

    grid.style.display = 'none';
    grid.innerHTML = '';
    unmetForm.hidden = true;
    skeleton.hidden = false;
    countEl.textContent = '—';

    // If no search input and no filter values, show fallback mock data
    if (!q && platform === 'all' && media_type === 'all') {
      skeleton.hidden = true;
      grid.style.display = '';
      countEl.textContent = MOCK_RESULTS.length;
      window.TWmeme.render.renderGrid(grid, MOCK_RESULTS, {
        onCopy: (m) => {/* mock copy, no log */},
      });
      return;
    }

    let memes = await window.TWmeme.supa.searchMemes(q, {
      platform,
      media_type,
      sort_by
    });

    skeleton.hidden = true;
    grid.style.display = '';

    let usingFallback = false;
    if (memes === null) {
      memes = MOCK_RESULTS;
      usingFallback = true;
    }

    countEl.textContent = memes.length;

    if (memes.length === 0) {
      unmetQuerySpan.textContent = q || '此篩選條件';
      unmetForm.hidden = false;
      if (q) {
        window.TWmeme.supa.logSearchQuery({
          queryText: q, hadResult: false, resultCount: 0,
        });
      }
      return;
    }

    window.TWmeme.render.renderGrid(grid, memes, {
      query: q,
      onCopy: (m) => {
        const idx = memes.indexOf(m);
        if (q) window.TWmeme.supa.logClick(q, idx);
      },
    });

    if (!usingFallback && q) {
      window.TWmeme.supa.logSearchQuery({
        queryText: q, hadResult: true, resultCount: memes.length,
      });
    }
  }

  async function submitUnmet() {
    const ta = document.getElementById('unmet-text');
    const desc = ta.value.trim();
    if (desc.length < 2) {
      window.TWmeme.render.showToast('多寫幾個字比較好找');
      return;
    }
    const r = await window.TWmeme.supa.submitUnmetSearch(desc);
    if (r.ok) {
      ta.value = '';
      unmetForm.hidden = true;
      window.TWmeme.render.showToast('收到、晚點補上');
    } else if (r.reason === 'throttled') {
      window.TWmeme.render.showToast('剛剛已收到、不用再送一次');
    } else {
      window.TWmeme.render.showToast('送出失敗、稍候再試');
    }
  }

  function syncUrl() {
    const q = document.getElementById('q').value.trim();
    const platform = document.getElementById('filter-platform').value;
    const media_type = document.getElementById('filter-type').value;
    const sort_by = document.getElementById('filter-sort').value;

    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (platform !== 'all') params.set('platform', platform);
    if (media_type !== 'all') params.set('type', media_type);
    if (sort_by !== 'relevance') params.set('sort', sort_by);

    const newUrl = location.pathname + (params.toString() ? '?' + params.toString() : '');
    history.pushState(null, '', newUrl);
  }

  function handleFilterChange() {
    syncUrl();
    loadResults();
  }

  window.addEventListener('popstate', () => {
    initFiltersFromUrl();
    loadResults();
  });

  document.getElementById('unmet-form-el').addEventListener('submit', (e) => {
    e.preventDefault();
    submitUnmet();
  });

  document.getElementById('search-form').addEventListener('submit', (e) => {
    e.preventDefault();
    handleFilterChange();
  });

  document.getElementById('filter-platform').addEventListener('change', handleFilterChange);
  document.getElementById('filter-type').addEventListener('change', handleFilterChange);
  document.getElementById('filter-sort').addEventListener('change', handleFilterChange);

  // Initialize
  initFiltersFromUrl();
  loadResults();
</script>
</body>
</html>
