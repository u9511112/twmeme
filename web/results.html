<body>

  <nav class="nav-links">

  </nav>

<div class="topbar">
  <a href="index.html" class="back" aria-label="返回">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <form class="searchbox" onsubmit="event.preventDefault(); doSearch();">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    <input id="q" type="text" value="">
    <button class="btn-search" type="submit" aria-label="搜尋">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </form>
  <div class="result-meta">找到 <strong id="count">—</strong> 張 · 按相關度</div>
</div>

<main>
<section class="section">
  <h1 class="sr-only">搜尋結果</h1>

  <!-- Zero-result fallback form: shown when no memes match the query.
       Inline above the (empty) grid so users don't have to scroll. -->
  <div id="unmet-form" class="unmet-form" hidden>
    <h2 class="unmet-title">沒找到「<span id="unmet-query"></span>」？</h2>
    <p class="unmet-sub">描述一下你想找的迷因、我們收集起來補上。</p>
    <form id="unmet-form-el">
      <textarea id="unmet-text" rows="3" maxlength="280"
        placeholder="例：那張柴犬被雷打到的反應圖、或是 PTT 那個館長跪的梗"></textarea>
      <button type="submit" class="unmet-submit">送出</button>
    </form>
  </div>

  <div class="masonry" id="grid"></div>
</section>
</main>

<footer class="site-footer">
  © 2026 TWmeme · 台灣繁中迷因社群工具
</footer>

<div class="toast" id="toast"></div>

<!-- Neon HTTP driver loaded lazily via dynamic import inside db.js -->
<!-- (web_anon DB creds in db.js are GRANT-restricted, public-safe) -->
<script src="db.js"></script>
<script src="render.js"></script>

<script>
  // Mock fallback if the DB is unreachable. Site never goes blank.
  // Same shape as DB rows (title + emoji thumb).
  const MOCK_RESULTS = [
    { title:'貓咪驚恐',     emoji:'😱',     bg:'t-sky',    quality:'4K', tall:true  },
    { title:'嚇歪貓',       emoji:'🙀',     bg:'t-coral',  quality:'HD' },
    { title:'暴怒橘貓',     emoji:'😾',     bg:'t-mustard',quality:'HD' },
    { title:'冒冷汗貓',     emoji:'🐱💦',   bg:'t-rose',   quality:'HD', tall:true  },
    { title:'黑貓受驚',     emoji:'🐈‍⬛😰', bg:'t-sage',   quality:'HD' },
    { title:'笑到流淚貓',   emoji:'😹',     bg:'t-plum',   quality:'4K' },
    { title:'偷看貓',       emoji:'🐾👀',   bg:'t-mint',   quality:'HD', tall:true  },
    { title:'得意貓',       emoji:'😼',     bg:'t-sand',   quality:'HD' },
    { title:'結冰貓',       emoji:'🧊🐱',   bg:'t-steel',  quality:'HD' },
    { title:'遮臉貓',       emoji:'🫣',     bg:'t-coral',  quality:'HD', tall:true  },
    { title:'翻白眼貓',     emoji:'🙄',     bg:'t-sky',    quality:'HD' },
    { title:'怒火貓',       emoji:'🐱🔥',   bg:'t-mustard',quality:'4K' },
  ];

  const params = new URLSearchParams(location.search);
  const q = (params.get('q') || '').trim();
  document.getElementById('q').value = q;

  const grid = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const unmetForm = document.getElementById('unmet-form');
  const unmetQuerySpan = document.getElementById('unmet-query');

  async function loadResults() {
    if (!q) {
      // direct hit on results.html with no query → show mock as discovery
      countEl.textContent = MOCK_RESULTS.length;
      window.TWmeme.render.renderGrid(grid, MOCK_RESULTS, {
        onCopy: (m) => {/* mock copy, no log */},
      });
      return;
    }

    let memes = await window.TWmeme.supa.searchMemes(q);

    // null = fetch failed; [] = success but zero results
    let usingFallback = false;
    if (memes === null) {
      memes = MOCK_RESULTS;
      usingFallback = true;
    }

    countEl.textContent = memes.length;

    if (memes.length === 0) {
      // Zero result: show the unmet-search form, log query had_result=false
      unmetQuerySpan.textContent = q;
      unmetForm.hidden = false;
      window.TWmeme.supa.logSearchQuery({
        queryText: q, hadResult: false, resultCount: 0,
      });
      return;
    }

    window.TWmeme.render.renderGrid(grid, memes, {
      onCopy: (m) => {
        // copy click is implicit click signal; record it
        const idx = memes.indexOf(m);
        window.TWmeme.supa.logClick(q, idx);
      },
    });

    // Don't log for the mock fallback — those queries didn't actually
    // hit our index, treating them as had_result=true would lie.
    if (!usingFallback) {
      window.TWmeme.supa.logSearchQuery({
        queryText: q, hadResult: true, resultCount: memes.length,
      });
    }
  }

  async function submitUnmet() {
    const ta = document.getElementById('unmet-text');
    const desc = ta.value.trim();
    if (desc.length < 2) {
      window.TWmeme.render.showToast('多寫幾個字比較好找');
      return;
    }
    const r = await window.TWmeme.supa.submitUnmetSearch(desc);
    if (r.ok) {
      ta.value = '';
      unmetForm.hidden = true;
      window.TWmeme.render.showToast('收到、晚點補上');
    } else if (r.reason === 'throttled') {
      window.TWmeme.render.showToast('剛剛已收到、不用再送一次');
    } else {
      window.TWmeme.render.showToast('送出失敗、稍候再試');
    }
  }

  // Bind submit via JS to guarantee preventDefault (inline onsubmit lost the
  // race in some browsers and the page navigated after writing to DB).
  document.getElementById('unmet-form-el').addEventListener('submit', (e) => {
    e.preventDefault();
    submitUnmet();
  });

  function doSearch() {
    const val = document.getElementById('q').value.trim();
    if (val) location.href = 'results.html?q=' + encodeURIComponent(val);
  }

  loadResults();
</script>
</body>
</html>
