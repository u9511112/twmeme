<script>
  // Phase 2 SSG: detail.html is the legacy SPA route. Every meme now has
  // a static /meme/<id>.html generated at build time (see
  // scripts/generate_static_pages.mjs). Old detail.html?id=xxx bookmarks
  // and external links redirect to the canonical static URL so we don't
  // serve duplicate content to Google / AI engines.
  (function() {
    try {
      var params = new URLSearchParams(location.search);
      var id = (params.get('id') || '').trim();
      // Basic UUID shape check; refuse weird inputs to avoid open-redirect-ish
      // surprises and stop the redirect loop if /meme/<garbage> would 404.
      if (/^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}$/i.test(id)) {
        location.replace('/meme/' + id);
      }
    } catch (_) { /* SPA fallback handles this */ }
  })();
</script>

<script>
  const PLATFORM_LABEL = {
    ptt: 'PTT', dcard: 'Dcard',
    threads: 'Threads', instagram: 'Instagram',
  };

  function fmtDate(iso) {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    } catch (_) { return '—'; }
  }

  function showEmpty(reason) {
    document.getElementById('detail-main').hidden = true;
    const empty = document.getElementById('detail-empty');
    empty.hidden = false;
    if (reason) {
      document.getElementById('empty-sub').textContent = reason;
    }
    document.title = '找不到這張迷因 — TWmeme';
  }

  function renderMeme(meme) {
    document.getElementById('detail-empty').hidden = true;
    document.getElementById('detail-main').hidden = false;

    const title = meme.title || '迷因';
    document.title = title + ' — TWmeme';
    document.getElementById('og-title').setAttribute('content', title + ' — TWmeme');
    document.getElementById('meme-title').textContent = title;

    const url = meme.cached_url || meme.media_url;
    const img = document.getElementById('meme-img');
    const emoji = document.getElementById('emoji-fallback');
    if (url) {
      img.src = url;
      img.alt = title;
      img.hidden = false;
      document.getElementById('og-image').setAttribute('content', url);
      img.addEventListener('error', () => {
        img.hidden = true;
        emoji.textContent = '🖼️';
        emoji.hidden = false;
      });
    } else {
      emoji.textContent = '🖼️';
      emoji.hidden = false;
    }

    if (meme.width && meme.height) {
      const badge = document.getElementById('quality-badge');
      badge.textContent = `${meme.width}×${meme.height}`;
      badge.hidden = false;
    }

    document.getElementById('meta-platform').textContent = '來源：' + (PLATFORM_LABEL[meme.platform] || meme.platform || '—');
    document.getElementById('meta-date').textContent = fmtDate(meme.fetched_at);

    const tagsRow = document.getElementById('tags-row');
    tagsRow.replaceChildren();
    function stat(emojiCh, count, label) {
      if (!count || count <= 0) return;
      const span = document.createElement('span');
      span.className = 'tag-sm';
      span.textContent = `${emojiCh} ${count} ${label}`;
      tagsRow.appendChild(span);
    }
    stat('❤', meme.like_count, '');
    stat('💬', meme.comment_count, '');
    stat('🔁', meme.share_count, '');

    // Render AI Interpretation metadata
    const aiSection = document.getElementById('ai-section');
    const aiOcr = document.getElementById('ai-ocr');
    const aiDesc = document.getElementById('ai-desc');
    const aiTags = document.getElementById('ai-tags');

    if (aiSection && (meme.ocr_text || meme.description || (meme.tags && meme.tags.length > 0))) {
      aiSection.hidden = false;
      
      // OCR text
      if (meme.ocr_text) {
        aiOcr.textContent = meme.ocr_text;
        aiOcr.hidden = false;
      } else {
        aiOcr.hidden = true;
      }

      // Description
      if (meme.description) {
        aiDesc.textContent = meme.description;
        aiDesc.hidden = false;
      } else {
        aiDesc.hidden = true;
      }

      // Tags Pill Chips with search links
      aiTags.replaceChildren();
      if (meme.tags && meme.tags.length > 0) {
        meme.tags.forEach(tag => {
          const a = document.createElement('a');
          a.className = 'chip-sm';
          a.href = 'results.html?q=' + encodeURIComponent(tag);
          a.textContent = '#' + tag;
          aiTags.appendChild(a);
        });
        aiTags.hidden = false;
      } else {
        aiTags.hidden = true;
      }
    } else if (aiSection) {
      aiSection.hidden = true;
    }

    if (meme.source_url) {
      const src = document.getElementById('btn-source');
      src.href = meme.source_url;
      src.hidden = false;
    }

    document.getElementById('btn-copy').addEventListener('click', async () => {
      if (!url) {
        window.TWmeme.render.showToast('沒有可複製的連結');
        return;
      }
      try {
        await navigator.clipboard.writeText(url);
        window.TWmeme.render.showToast('已複製連結到剪貼簿');
      } catch (_) {
        window.TWmeme.render.showToast('複製失敗、長按圖片用瀏覽器複製');
      }
    });

    document.getElementById('btn-download').addEventListener('click', () => {
      if (!url) {
        window.TWmeme.render.showToast('沒有可下載的圖片');
        return;
      }
      const a = document.createElement('a');
      a.href = url;
      a.download = (title || 'meme') + '.jpg';
      a.target = '_blank';
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.TWmeme.render.showToast('開啟下載');
    });

    document.getElementById('btn-share').addEventListener('click', async () => {
      const shareData = {
        title: title + ' — TWmeme',
        text: title,
        url: location.href,
      };
      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (_) { /* user cancelled */ }
      } else {
        try {
          await navigator.clipboard.writeText(location.href);
          window.TWmeme.render.showToast('已複製這頁連結');
        } catch (_) {
          window.TWmeme.render.showToast('長按網址列複製');
        }
      }
    });
  }

  function doDetailSearch() {
    const v = document.getElementById('detail-q').value.trim();
    if (v) location.href = 'results.html?q=' + encodeURIComponent(v);
  }

  async function loadDetail() {
    const params = new URLSearchParams(location.search);
    const id = (params.get('id') || '').trim();
    if (!id) {
      showEmpty('沒有指定迷因。');
      return;
    }
    const meme = await window.TWmeme.supa.getMemeById(id);
    if (!meme) {
      showEmpty();
      return;
    }
    renderMeme(meme);
  }

  loadDetail();
</script>
</body>
